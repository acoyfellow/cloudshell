# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  - package-ecosystem: bun
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    groups:
      minor-updates:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps
      include: scope
