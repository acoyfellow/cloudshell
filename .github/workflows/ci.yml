name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Svelte + TypeScript
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: License check
        run: >
          bunx license-checker
          --production
          --excludePrivatePackages
          --onlyAllow
          'MIT;Apache-2.0;BSD-3-Clause;BSD-2-Clause;ISC;MIT-0;0BSD;MIT OR Apache-2.0;BlueOak-1.0.0;LGPL-3.0-or-later;MPL-2.0;CC0-1.0;(MIT OR GPL-3.0-or-later);(MIT AND Zlib);MIT*'

  deploy:
    name: Deploy
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Deploy
        env:
          ALCHEMY_CI_STATE_STORE_CHECK: 'false'
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          TERMINAL_TICKET_SECRET: ${{ secrets.TERMINAL_TICKET_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          # Bisect smoke path (2026-04-18): enables /terminal?secret=...
          # pointing at CloudShellParityTerminal (minimal node+ws container).
          # Used to distinguish "cloudshell image is broken" vs
          # "Worker→Container path is broken" after Containers GA. The guard
          # token isn't security-critical (just a query-string gate for a
          # diagnostic echo endpoint). Rotate or unset when bisect is done.
          TERMINAL_PARITY_SECRET: cs-parity-smoke-2026-04-18
        run: bun run deploy
